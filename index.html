<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-width=1.0" />
    <title>Badge Magic – LED Badge Designer</title>
    <meta
      name="description"
      content="Design and send messages to FOSSASIA LED name badges from your browser. Create animated text, pick pixel-art icons, and preview on a live grid. Connect via Web Bluetooth—no app required."
    />
    <meta property="og:title" content="Badge Magic – LED Badge Designer" />
    <meta property="og:description" content="Design and send messages to LED name badges from your browser. Animated text, pixel-art icons, live preview. Web Bluetooth—no app required." />
    <meta name="github-repo" content="https://github.com/thangman22/magic-badge-web" />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-effects">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
    </div>

    <main class="container">
      <header>
        <h1>Badge Magic</h1>
        <p>Control your LED Badge directly from the browser</p>
        <!-- Hidden font preloader -->
        <div
          style="
            font-size: 0;
            height: 0;
            visibility: hidden;
            pointer-events: none;
            position: absolute;
          "
        >
          <span style="font-family: &quot;Press Start 2P&quot;">.</span>
          <span style="font-family: &quot;Silkscreen&quot;">.</span>
        </div>
      </header>

      <section class="card glassmorphism">
        <div class="app-container">
          <!-- Live Preview Grid -->
          <div class="preview-container">
            <div class="led-matrix" id="led-matrix">
              <!-- 11x44 grid injected via JS -->
            </div>
          </div>

          <div class="message-input-area">
            <div class="input-group" style="margin-bottom: 0.5rem">
              <textarea
                id="message"
                placeholder="HELLO WORLD"
                rows="2"
                maxlength="250"
              >
HELLO WORLD</textarea
              >
            </div>

            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1rem;
              "
            >
              <div
                style="
                  font-size: 0.75rem;
                  color: var(--text-secondary);
                  text-transform: uppercase;
                  font-weight: 600;
                  letter-spacing: 0.05em;
                "
              >
                Insert Badge Icon
              </div>
              <div class="font-selector-container">
                <select id="font-family" class="font-select">
                  <option value="default">Default Font (Handcrafted)</option>
                  <option value="Press Start 2P">Retro 8-Bit</option>
                  <option value="Silkscreen">Silkscreen</option>
                </select>
              </div>
            </div>
            <div class="icon-picker" id="icon-picker">
              <!-- Icons injected here -->
            </div>
          </div>

          <div class="tabs">
            <button class="tab-btn active" data-tab="speedTab">Speed</button>
            <button class="tab-btn" data-tab="transitionTab">Animation</button>
            <button class="tab-btn" data-tab="effectTab">Effect</button>
          </div>

          <div class="tab-content active" id="speedTab">
            <div class="input-group">
              <label for="speedSlider"
                >Speed: <span id="speed-display">2</span></label
              >
              <input
                type="range"
                id="speedSlider"
                min="1"
                max="8"
                value="2"
                class="normal-slider"
              />
              <!-- Hidden select to keep logic backward compatible -->
              <select id="speed" style="display: none">
                <option value="0">1</option>
                <option value="16">2</option>
                <option value="32">3</option>
                <option value="48">4</option>
                <option value="64">5</option>
                <option value="80">6</option>
                <option value="96">7</option>
                <option value="112" selected>8</option>
              </select>
            </div>
          </div>

          <div class="tab-content" id="transitionTab">
            <div
              style="
                padding: 10px;
                display: flex;
                flex-direction: column;
                gap: 15px;
              "
            >
              <div class="effect-grid" id="transition-grid">
                <button class="visual-select-btn active" data-value="0">
                  <img src="assets/animations/ic_anim_left.gif" alt="Left" />
                  <span>Left</span>
                </button>
                <button class="visual-select-btn" data-value="1">
                  <img src="assets/animations/ic_anim_right.gif" alt="Right" />
                  <span>Right</span>
                </button>
                <button class="visual-select-btn" data-value="2">
                  <img src="assets/animations/ic_anim_up.gif" alt="Up" />
                  <span>Up</span>
                </button>
                <button class="visual-select-btn" data-value="3">
                  <img src="assets/animations/ic_anim_down.gif" alt="Down" />
                  <span>Down</span>
                </button>
                <button class="visual-select-btn" data-value="4">
                  <img src="assets/animations/ic_anim_fixed.gif" alt="Fixed" />
                  <span>Fixed</span>
                </button>
                <button class="visual-select-btn" data-value="5">
                  <img
                    src="assets/animations/ic_anim_animation.gif"
                    alt="Animation"
                  />
                  <span>Animation</span>
                </button>
                <button class="visual-select-btn" data-value="6">
                  <img
                    src="assets/animations/ic_anim_snowflake.gif"
                    alt="Snowflake"
                  />
                  <span>Snowflake</span>
                </button>
                <button class="visual-select-btn" data-value="7">
                  <img
                    src="assets/animations/ic_anim_picture.gif"
                    alt="Picture"
                  />
                  <span>Picture</span>
                </button>
                <button class="visual-select-btn" data-value="8">
                  <img src="assets/animations/ic_anim_laser.gif" alt="Laser" />
                  <span>Laser</span>
                </button>
              </div>
            </div>

            <!-- Hidden transition select for backend -->
            <select id="effect" style="display: none">
              <option value="0" selected>Left</option>
              <option value="1">Right</option>
              <option value="2">Up</option>
              <option value="3">Down</option>
              <option value="4">Fixed</option>
              <option value="5">Animation</option>
              <option value="6">Snowflake</option>
              <option value="7">Picture</option>
              <option value="8">Laser</option>
              <option value="9">Pacman</option>
              <option value="10">Chevron</option>
              <option value="11">Diamond</option>
              <option value="12">Broken</option>
              <option value="13">Cupid</option>
              <option value="14">Feet</option>
              <option value="15">Fish</option>
              <option value="16">Diagonal</option>
              <option value="17">Alert</option>
              <option value="18">Heartbeat</option>
              <option value="19">Fireworks</option>
              <option value="20">Equalizer</option>
            </select>
          </div>

          <div class="tab-content" id="effectTab">
            <div class="effect-grid" id="visual-effect-grid">
              <button class="visual-effect-btn" data-effect="flash">
                <img src="assets/effects/ic_effect_flash.gif" alt="Flash" />
                <span>Flash</span>
              </button>
              <button class="visual-effect-btn" data-effect="marquee">
                <img src="assets/effects/ic_effect_marquee.gif" alt="Marquee" />
                <span>Marquee</span>
              </button>
              <button class="visual-effect-btn" data-effect="invert">
                <img src="assets/effects/ic_effect_invert.gif" alt="Invert" />
                <span>Invert</span>
              </button>
            </div>

            <!-- Keep these for JS logic compatibility -->
            <input type="checkbox" id="flash" style="display: none" />
            <input type="checkbox" id="marquee" style="display: none" />
            <input type="checkbox" id="invert" style="display: none" />
          </div>
          <button id="send-btn" class="primary-btn">
            <span>Connect & Send</span>
            <div class="btn-glow"></div>
          </button>

          <div id="status" class="status-message">Ready to connect...</div>
        </div>
      </section>
      <footer class="github-footer">
        <p class="footer-credit">Built with 🧡 by <a href="https://github.com/thangman22" target="_blank" rel="noopener noreferrer">@thangman22</a></p>
        <a id="github-link" class="github-link" href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
          <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          <span>GitHub</span>
        </a>
      </footer>
    </main>

    <script src="charCodes.js"></script>
    <script src="svgAssets.js"></script>
    <script src="app.js"></script>
    <script>
      (function () {
        var meta = document.querySelector('meta[name="github-repo"]');
        var link = document.getElementById('github-link');
        if (meta && link && meta.getAttribute('content')) link.href = meta.getAttribute('content');
      })();
    </script>
  </body>
</html>
